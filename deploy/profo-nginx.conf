# Profo Nginx 配置 - fangmengchina.com
# 将此文件放置于 /etc/nginx/sites-available/profo
# 然后创建软链接: ln -s /etc/nginx/sites-available/profo /etc/nginx/sites-enabled/profo

# ==================== C端域名 HTTP -> HTTPS ====================
server {
    listen 80;
    listen [::]:80;
    server_name fangmengchina.com www.fangmengchina.com;

    return 301 https://$host$request_uri;
}

# ==================== 管理端域名 HTTP -> HTTPS ====================
server {
    listen 80;
    listen [::]:80;
    server_name admin.fangmengchina.com;

    return 301 https://$host$request_uri;
}

# ==================== C端 HTTPS 主配置 ====================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fangmengchina.com www.fangmengchina.com;

    ssl_certificate /etc/letsencrypt/live/fangmengchina.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fangmengchina.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    access_log /var/log/nginx/profo-c.access.log;
    error_log /var/log/nginx/profo-c.error.log;

    client_max_body_size 100M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # uploads 优先直服持久化目录，避免软链跟随和 /root 权限问题
    location /static/uploads/ {
        alias /root/profo-data/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        gzip on;
        gzip_types image/svg+xml;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location /static/ {
        alias /root/profo/backend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        gzip on;
        gzip_types image/svg+xml;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000/_next/static/;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ==================== 管理端 HTTPS 配置 ====================
